<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Vlaky">
  <title>Vlaky – Dolní Počernice</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #111;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
    }

    /* ── Header ── */
    header {
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      padding: 12px 16px 10px;
      padding-top: calc(12px + env(safe-area-inset-top));
      position: sticky;
      top: 0;
      z-index: 10;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
    }

    header .right {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #clock {
      font-size: 16px;
      font-weight: 600;
      color: #aaa;
      font-variant-numeric: tabular-nums;
    }

    #btn-refresh {
      background: #2a2a2a;
      border: 1px solid #3a3a3a;
      color: #bbb;
      font-size: 13px;
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      touch-action: manipulation;
    }
    #btn-refresh:active  { background: #383838; }
    #btn-refresh:disabled { opacity: 0.4; }

    /* ── Status bar ── */
    #status {
      font-size: 12px;
      color: #555;
      padding: 6px 16px;
      min-height: 26px;
    }

    /* ── Karty vlaků ── */
    #content {
      padding: 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .card {
      background: #1c1c1c;
      border-radius: 12px;
      padding: 14px 16px;
      display: grid;
      grid-template-columns: auto 1fr;
      grid-template-rows: auto auto auto;
      column-gap: 16px;
      row-gap: 2px;
    }

    /* Čas vlevo nahoře */
    .card-time {
      grid-column: 1;
      grid-row: 1;
      font-size: 32px;
      font-weight: 800;
      color: #fff;
      line-height: 1;
      letter-spacing: -0.5px;
      font-variant-numeric: tabular-nums;
      align-self: start;
      min-width: 90px;
    }

    /* Zpoždění – pod časem, malé */
    .card-delay {
      grid-column: 1;
      grid-row: 2;
      font-size: 12px;
      font-weight: 600;
      align-self: start;
    }
    .delay-ok    { color: #4caf50; }
    .delay-warn  { color: #ffc107; }
    .delay-late  { color: #f44336; }
    .delay-early { color: #666; }

    /* Dopravce + typ + číslo – vpravo nahoře */
    .card-train {
      grid-column: 2;
      grid-row: 1;
      font-size: 15px;
      color: #ccc;
      display: flex;
      align-items: center;
      gap: 6px;
      align-self: start;
    }

    .carrier-badge {
      font-size: 11px;
      font-weight: 800;
      padding: 2px 6px;
      border-radius: 4px;
      letter-spacing: 0.3px;
    }
    .carrier-CD { background: #1a3a6b; color: #7eb3ff; }
    .carrier-RJ { background: #4a1a00; color: #ffaa44; }
    .carrier-LE { background: #001a4a; color: #44aaff; }
    .carrier-GW { background: #1a2a1a; color: #88cc88; }
    .carrier-XX { background: #2a2a2a; color: #999; }

    .train-type { font-weight: 700; color: #ddd; }
    .train-num  { color: #888; }

    /* Trasa – vpravo druhý řádek */
    .card-route-line {
      grid-column: 2;
      grid-row: 2;
      font-size: 13px;
      color: #777;
      align-self: start;
    }
    .card-route-line .sep { margin: 0 4px; color: #444; }

    /* Směr – přes oba sloupce, spodní řádek */
    .card-dir {
      grid-column: 1 / 3;
      grid-row: 3;
      font-size: 18px;
      font-weight: 700;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid #2a2a2a;
    }
    .dir-kyje      { color: #4a9eff; }
    .dir-bechovice { color: #ff9a3c; }
    .dir-unknown   { color: #666; }

    /* ── Prázdný stav ── */
    #empty {
      text-align: center;
      color: #444;
      padding: 60px 16px;
      font-size: 15px;
    }
  </style>
</head>
<body>

<header>
  <h1>Praha – Dolní Počernice</h1>
  <div class="right">
    <span id="clock"></span>
    <button id="btn-refresh" onclick="refresh()">Obnovit</button>
  </div>
</header>

<div id="status">Připraveno.</div>
<div id="content"></div>

<script>
const CONFIG = {
  stationSR70:   '53036',
  windowMinutes: 30,
  bbox: { xMin: -850000, xMax: -620000, yMin: -1150000, yMax: -950000 },
  concurrency:   30,
}

const BASE_URL = 'https://mapy.spravazeleznic.cz/serverside/request2.php'

// ── Hodiny v headeru ─────────────────────────────────────────────────────────
setInterval(() => {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
}, 1000)

// ── API ──────────────────────────────────────────────────────────────────────
async function apiPost(module, action, params = {}) {
  const body = new URLSearchParams({ module, action, ...params })
  const res = await fetch(
    `${BASE_URL}?module=${encodeURIComponent(module)}&&action=${encodeURIComponent(action)}`,
    {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded; charset=UTF-8' },
      body,
    }
  )
  return res.json()
}

// ── XOR dekódování ────────────────────────────────────────────────────────────
function xorDecode(b64) {
  const raw = Uint8Array.from(atob(b64), c => c.charCodeAt(0))
  const today = new Date()
  for (const delta of [0, -1]) {
    const d = new Date(today)
    d.setDate(d.getDate() + delta)
    const key = new TextEncoder().encode(
      d.getFullYear() +
      String(d.getMonth() + 1).padStart(2, '0') +
      String(d.getDate()).padStart(2, '0')
    )
    const dec = raw.map((b, i) => b ^ key[i % key.length])
    try { return JSON.parse(new TextDecoder().decode(dec)) } catch {}
  }
  throw new Error('XOR decode selhal')
}

// ── Parser trasy vlaku ────────────────────────────────────────────────────────
function parseRoute(html) {
  const doc = new DOMParser().parseFromString(html, 'text/html')
  const stops = []
  for (const tr of doc.querySelectorAll('tr')) {
    const tds = tr.querySelectorAll('td')
    if (!tds.length) continue
    const nameTd = tds[0]
    const name = nameTd.textContent.trim()
    if (!name) continue
    const sr70 = (nameTd.getAttribute('data-infotabule') || '').trim()
    const times = []
    for (let i = 3; i < tds.length; i++) {
      const t = tds[i].textContent.trim()
      if (t) times.push(t)
    }
    stops.push({ name, sr70, times })
  }
  return stops
}

// ── Pomocné funkce ────────────────────────────────────────────────────────────
function timeInWindow(timeStr, now, windowMin) {
  timeStr = timeStr.trim().replace(/[()]/g, '')
  if (!timeStr || !timeStr.includes(':')) return false
  const [h, m] = timeStr.split(':').map(Number)
  const t = new Date(now)
  t.setHours(h, m, 0, 0)
  if (t < new Date(now.getTime() - 2 * 3600 * 1000)) t.setDate(t.getDate() + 1)
  return t >= now && t <= new Date(now.getTime() + windowMin * 60 * 1000)
}

async function promisePool(items, fn, concurrency) {
  const results = new Array(items.length)
  let idx = 0
  async function worker() {
    while (idx < items.length) { const i = idx++; results[i] = await fn(items[i]) }
  }
  await Promise.all(Array.from({ length: Math.min(concurrency, items.length) }, worker))
  return results
}

function carrierInfo(d) {
  if (d.includes('České dráhy')) return { label: 'ČD', cls: 'carrier-CD' }
  if (d.includes('RegioJet'))    return { label: 'RJ', cls: 'carrier-RJ' }
  if (d.includes('Leo Express')) return { label: 'LE', cls: 'carrier-LE' }
  if (d.includes('GWTR'))        return { label: 'GW', cls: 'carrier-GW' }
  return { label: d.slice(0, 2) || '?', cls: 'carrier-XX' }
}

function dirInfo(prev) {
  if (!prev) return { text: '', cls: 'dir-unknown' }
  if (prev.includes('Kyje'))      return { text: '→ Kyje',       cls: 'dir-kyje' }
  if (prev.includes('Běchovice')) return { text: '← Běchovice',  cls: 'dir-bechovice' }
  return { text: '← ' + prev.slice(0, 16), cls: 'dir-unknown' }
}

function delayInfo(delay) {
  const d = Number(delay) || 0
  if (d > 5)  return { text: `+${d} min`, cls: 'delay-late' }
  if (d > 0)  return { text: `+${d} min`, cls: 'delay-warn' }
  if (d < 0)  return { text: `${d} min`,  cls: 'delay-early' }
  return       { text: 'včas',            cls: 'delay-ok' }
}

// ── Hlavní logika ─────────────────────────────────────────────────────────────
async function findPassingTrains() {
  const resp = await apiPost('Layers\\OsVlaky', 'load2')
  let encoded = resp.result
  if (Array.isArray(encoded)) encoded = encoded[0]
  const trains = xorDecode(encoded)

  const { xMin, xMax, yMin, yMax } = CONFIG.bbox
  const nearby = trains
    .filter(t => { const [x, y] = t.g.c; return x >= xMin && x <= xMax && y >= yMin && y <= yMax })
    .map(t => t.p)

  setStatus(`Vlaky v oblasti: ${nearby.length} – stahuji trasy…`)

  const now = new Date()
  let done = 0

  async function fetchAndMatch(t) {
    try {
      const detail = await apiPost('Layers\\OsVlaky', 'loadDetail', {
        trainNumber: btoa(t.id), onlyCommercialStop: 0,
      })
      const stops = parseRoute(detail.detail || '')
      for (let i = 0; i < stops.length; i++) {
        const stop = stops[i]
        if (stop.sr70 !== CONFIG.stationSR70) continue
        const times  = stop.times
        const sched  = times[0] || ''
        const actual = times[1] ? times[1].replace(/[()]/g, '') : ''
        const check  = actual || sched
        if (!timeInWindow(check, now, CONFIG.windowMinutes)) return null
        return {
          sched, actual,
          trainType: t.tt || '',
          trainNum:  t.tn || '',
          from:      t.fn || '',
          to:        t.ln || '',
          delay:     t.de || 0,
          prevStop:  i > 0 ? stops[i - 1].name : '',
          carrier:   t.d  || '',
        }
      }
    } catch {}
    finally {
      done++
      if (done % 20 === 0 || done === nearby.length) setStatus(`Načítám trasy… ${done} / ${nearby.length}`)
    }
    return null
  }

  const raw = await promisePool(nearby, fetchAndMatch, CONFIG.concurrency)
  return raw.filter(Boolean).sort((a, b) => a.sched.localeCompare(b.sched))
}

// ── Vykreslení ────────────────────────────────────────────────────────────────
function renderResults(results, elapsed) {
  const t = new Date()
  const ts = t.toLocaleTimeString('cs-CZ', { hour: '2-digit', minute: '2-digit', second: '2-digit' })
  const n = results.length
  setStatus(`${n} vlak${n === 1 ? '' : n < 5 ? 'y' : 'ů'} · obnoveno ${ts} · ${(elapsed/1000).toFixed(1)}s`)

  const content = document.getElementById('content')
  if (!results.length) {
    content.innerHTML = `<div id="empty">Žádné vlaky v příštích ${CONFIG.windowMinutes} min.</div>`
    return
  }

  content.innerHTML = results.map(r => {
    const c  = carrierInfo(r.carrier)
    const dl = delayInfo(r.delay)
    const di = dirInfo(r.prevStop)
    return `<div class="card">
      <div class="card-time">${r.actual || r.sched}</div>
      <div class="card-train">
        <span class="carrier-badge ${c.cls}">${c.label}</span>
        <span class="train-type">${r.trainType}</span>
        <span class="train-num">${r.trainNum}</span>
      </div>
      <div class="card-delay ${dl.cls}">${dl.text}</div>
      <div class="card-route-line">${r.from}<span class="sep">→</span>${r.to}</div>
      <div class="card-dir ${di.cls}">${di.text}</div>
    </div>`
  }).join('')
}

// ── Refresh ───────────────────────────────────────────────────────────────────
let autoRefreshTimer = null

async function refresh() {
  const btn = document.getElementById('btn-refresh')
  btn.disabled = true
  clearTimeout(autoRefreshTimer)
  const t0 = Date.now()
  try {
    setStatus('Načítám…')
    renderResults(await findPassingTrains(), Date.now() - t0)
  } catch (e) {
    setStatus(`Chyba: ${e.message}`)
  } finally {
    btn.disabled = false
    autoRefreshTimer = setTimeout(refresh, 2 * 60 * 1000)
  }
}

function setStatus(msg) { document.getElementById('status').textContent = msg }

refresh()
</script>
</body>
</html>
